_schema-version: "3.2"
ID: appfront-mta-demo
version: 1.0.0
description: MTA-based Application Frontend deployment example

modules:
  - name: appfront-mta-demo-app
    type: html5
    path: app
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

  - name: appfront-mta-demo-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: appfront-mta-demo-app-front
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: appfront-mta-demo-app
          artifacts:
            - "*.zip"
          target-path: resources/

resources:
  - name: appfront-mta-demo-app-front
    type: org.cloudfoundry.managed-service
    parameters:
      service: app-front
      service-plan: developer
